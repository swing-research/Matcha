# Config for `python src/run.py --align configs/config.yaml`
#
# When run as a RELION External job, most Required fields are set automatically
# from the GUI - no need to edit them here:
#
#   RELION GUI field          -> config / CLI flag
#   -------------------------------------------------
#   "Input 3D reference"      -> path_templates
#   "Input 3D mask"           -> path_template_mask
#   "Input particles"         -> particles_starfile
#   "Mask diameter (A)"       -> --mask_diameter  (sets box_size)
#   "Offset range (pix.)"     -> --offset_range   (sets shift_search_radius)
#   "Number of GPUs"          -> --gpu            (sets gpu_ids)

# -- Required ------------------------------------------------------------------
path_templates:
  - "/path/to/half1_template.mrc"
  - "/path/to/half2_template.mrc"
path_template_mask: ""            # optional; leave empty to skip masking

particles_starfile: "/path/to/particles.star"
path_output: "matcha_output"

gpu_ids: [0]                      # prefer --gpu on the CLI
box_size: 570                     # voxels; prefer --mask_diameter on the CLI

# -- Algorithm -----------------------------------------------------------------
# Li defines the progressive refinement schedule; max(Li) = correlator bandlimit
matcha_config:
  Li: [30, 40, 65]    # In paper: bin1: [30, 40, 65], bin2: [30,40]
  candidates: 10      # candidate rotations to refine per Newton round
  num_steps: 5        # Newton steps per candidate
  oversampling_factor_K: 2

# -- Defaults (rarely need changing) ------------------------------------------
num_alternations: 3
use_prior_rotation: false
precision_mode: "fast"            # "fast" (1e-4) or "accurate" (formula-derived)

# -- Performance ---------------------------------------------------------------
num_subtomograms_per_batch: "auto"  # or an integer; "auto" probes GPU memory
auto_batch_safety: 0.9             # fraction of free VRAM to target
reduce_memory: true
micro_batch_split: 2

# -- Shift refinement ----------------------------------------------------------
do_ctf_correction: false
shift_search_radius: 2            # prefer --offset_range on the CLI
shift_upsample_factor: 8          # sub-pixel precision: 1/factor voxels

# -- Lookup tables -------------------------------------------------------------
cs_path: "data/cs_l=3000_k=2500.mat"
jl_zeros_path: "data/jl_zeros_l=3000_k=2500.mat"

# -- Other ---------------------------------------------------------------------
do_random_half: true              # true = align each rlnRandomSubset half against its own template
random_seed: 42

# -- Expert --------------------------------------------------------------------
matcha_config_expert:
  reinits: 1
  step_type: "newton"
  stop_early: false
  do_random_sampling: false
  reinits_iterations: 0
