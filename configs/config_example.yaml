# Config for `python src/example.py --config configs/config_example.yaml`

# -- Required ------------------------------------------------------------------
path_template: "data/run2_class001.mrc"

# -- Algorithm -----------------------------------------------------------------
# Li defines the progressive refinement schedule; max(Li) = correlator bandlimit
matcha_config:
  Li: [30, 40, 60]
  candidates: 10      # candidate rotations to refine per Newton round
  num_steps: 1        # Newton steps per candidate
  oversampling_factor_K: 2

# -- Defaults (rarely need changing) ------------------------------------------
precision_mode: "fast"            # "fast" (1e-4) or "accurate" (formula-derived)

# -- Lookup tables -------------------------------------------------------------
cs_path: "data/cs_l=3000_k=2500.mat"
jl_zeros_path: "data/jl_zeros_l=3000_k=2500.mat"

# -- Example benchmark settings -----------------------------------------------
example_config:
  number_subtomograms: 1000
  batchsize: 10
  snr_db: 0.0
  masking_radius: 70              # radius of spherical mask applied to subtomograms (voxels)
  L_max: 40                       # bandlimit for simulated subtomograms

# -- Orientation search backend -----------------------------------------------
orientation_search:
  method: "matcha"                # "matcha" or "sofft"
  timing:
    warmup_runs: 1
    timed_runs: 2
    print_per_batch: false

# -- SOFFT settings (used when orientation_search.method == "sofft") ----------
sofft_config:
  L_max: 40
  oversampling_factor_K: 1

# -- Expert --------------------------------------------------------------------
matcha_config_expert:
  reinits: 1
  step_type: "newton"
  stop_early: false
  do_random_sampling: false
